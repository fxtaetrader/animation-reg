<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Register</title>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#5f6df0,#8f94fb);
overflow:hidden;

}

/* FORM */

.form-box{

width:340px;
padding:35px;
background:white;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
z-index:2;

}

.form-box h2{

text-align:center;
margin-bottom:20px;

}

.form-box input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;

}

.form-box input:focus{

border-color:#5f6df0;
outline:none;
box-shadow:0 0 6px rgba(95,109,240,0.4);

}

.form-box button{

width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#5f6df0;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;

}

/* CHARACTER */

.character{

position:absolute;
left:-250px;
bottom:40px;
width:200px;

animation: walk 6s forwards;

}

@keyframes walk{

0%{
left:-250px;
}

70%{
left:25%;
}

100%{
left:25%;
}

}

/* SPEECH BUBBLE */

.bubble{

position:absolute;
bottom:200px;
left:25%;
background:white;
padding:12px 18px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
font-weight:bold;

opacity:0;

animation: showBubble 1s forwards;
animation-delay:6s;

}

@keyframes showBubble{

to{
opacity:1;
}

}

/* POINTING HAND */

.pointer{

position:absolute;
left:30%;
bottom:120px;
font-size:40px;

opacity:0;

animation: showPointer 1s forwards;
animation-delay:6s;

}

@keyframes showPointer{

to{
opacity:1;
}

}

</style>
</head>

<body>

<!-- LOTTIE 3D CHARACTER -->

<div class="character">

<lottie-player
src="https://assets2.lottiefiles.com/packages/lf20_tfb3estd.json"
background="transparent"
speed="1"
style="width:200px;height:200px;"
loop
autoplay>

</lottie-player>

</div>

<!-- SPEECH -->

<div class="bubble">

Register here!

</div>

<!-- POINTER -->

<div class="pointer">

👉

</div>

<!-- FORM -->

<div class="form-box">

<h2>Create Account</h2>

<input id="username" type="text" placeholder="Username">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Register</button>

</div>

<script>

/* Auto focus */

window.onload = function(){

document.getElementById("username").focus();

};

</script>

</body>
</html>
